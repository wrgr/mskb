name: Deploy Starlight site to gh-pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-gh-pages.yml"
      - "site/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install npm dependencies
        working-directory: site
        run: npm ci --no-audit --no-fund

      - name: Preflight explorer assets
        run: |
          test -f site/src/content/docs/explorer.mdx
          test -f site/public/javascripts/explorer.js
          test -f site/public/assets/explorer_graph.json
          test -f site/public/assets/explorer_details.json
          test -f site/public/assets/explorer_graph_lite.json
          test -f site/public/assets/explorer_details_lite.json

      - name: Build Starlight site
        working-directory: site
        run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site/dist
          force_orphan: true
          enable_jekyll: false
