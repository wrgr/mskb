name: Deploy MkDocs to gh-pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-gh-pages.yml"
      - "site/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight explorer assets
        run: |
          test -f site/docs/explorer.md
          test -f site/docs/assets/explorer_graph_lite.json
          test -f site/docs/assets/explorer_details_lite.json
          test -f site/docs/assets/explorer_graph.json
          test -f site/docs/assets/explorer_details.json

      - name: Build static site
        run: python -m mkdocs build -f site/mkdocs.yml --strict

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site/site
          force_orphan: true
          enable_jekyll: false
