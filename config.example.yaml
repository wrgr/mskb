email: "your-email@example.com"

openalex_base_url: "https://api.openalex.org"

output_dir: "outputs"

retrieval:
  per_page: 200
  max_search_results_per_query: 500
  max_pages_cited_by: 3
  use_seed_channel: true
  use_lexical_channel: true
  use_dataset_channel: true
  seed_reference_enrichment:
    enabled: true
    use_crossref: true
    use_semantic_scholar: true
    use_openalex_title_search: true
    max_crossref_refs_per_seed: 250
    max_semantic_scholar_refs_per_seed: 250
    max_search_results_per_reference: 8
    max_title_queries_per_seed: 40
    min_title_similarity: 88.0
    max_year_delta: 3
    request_timeout_seconds: 30
    search_sleep_seconds: 0.03
    semantic_scholar_api_key_env: "SEMANTIC_SCHOLAR_API_KEY"

queries:
  lexical:
    # Layer 1 — Foundation
    - "multiple sclerosis global epidemiology prevalence incidence"
    - "multiple sclerosis natural history disability progression"
    - "multiple sclerosis phenotype relapsing progressive clinical course"
    - "multiple sclerosis pathology demyelination neurodegeneration"
    - "multiple sclerosis immunology T cell B cell microglia"
    - "multiple sclerosis genetics HLA-DRB1 genome-wide association"
    - "Epstein-Barr virus multiple sclerosis risk etiology"
    - "multiple sclerosis environmental risk factors vitamin D smoking"
    # Layer 2 — Clinical
    - "multiple sclerosis MRI diagnosis monitoring McDonald criteria"
    - "paramagnetic rim lesions slowly expanding chronic active multiple sclerosis"
    - "neurofilament light GFAP serum blood biomarker multiple sclerosis"
    - "multiple sclerosis disease-modifying therapy anti-CD20 ocrelizumab"
    - "multiple sclerosis smoldering PIRA progression independent relapse"
    - "multiple sclerosis patient-reported outcomes EDSS quality of life"
    - "multiple sclerosis comorbidities depression cognitive impairment"
    - "multiple sclerosis pregnancy DMT family planning"
    # Layer 3 — Context and Future
    - "pediatric multiple sclerosis POMS diagnosis treatment"
    - "multiple sclerosis racial disparities equity health disparities"
    - "multiple sclerosis artificial intelligence machine learning prediction"
    - "remyelination neuroprotection oligodendrocyte multiple sclerosis therapy"
  dataset:
    - "MSBase registry multiple sclerosis"
    - "IMSGC genome-wide association multiple sclerosis"
    - "NARCOMS registry multiple sclerosis"
    - "Atlas of MS multiple sclerosis global"
    - "GBD Global Burden of Disease multiple sclerosis"
    - "Lyon cohort natural history multiple sclerosis"
    - "Kaiser Permanente multiple sclerosis cohort"

dedup:
  auto_merge_threshold: 0.85

graphs:
  min_cocitation_weight: 2
  min_bibcoupling_weight: 2
  min_coauthorship_weight: 1

scoring:
  include_if_min_signals: 1
  include_if_score_at_least: 0.15
  ms_focus:
    # Major upweight for papers with explicit MS lexical + concept linkage.
    lexical_min_hits: 1
    concept_min_hits: 1
    minor_boost_multiplier: 1.2
    boost_multiplier: 1.65
  core_vs_context:
    # core_only | core_plus_context
    mode: "core_plus_context"
    bridge:
      min_seed_affinity: 2.0
      min_in_degree: 3
      min_kcore: 4
  downweight:
    # Downweight generic biology papers without an apparent MS link.
    biology_hit_min: 2
    biology_no_ms_multiplier: 0.35
  topic_balance:
    enabled: true
    # Enforced on anchor-based categories during scoring.
    # Ranges reflect the new orientation-guide seed distribution:
    # epi=8, path=7, img=6, trial=4, ccm=11 out of 36 total seeds.
    target_ranges:
      pathogenesis_and_immunology: {min_pct: 0.12, max_pct: 0.32}
      imaging_and_biomarkers: {min_pct: 0.12, max_pct: 0.30}
      clinical_trials_and_therapeutics: {min_pct: 0.08, max_pct: 0.25}
      clinical_care_and_management: {min_pct: 0.15, max_pct: 0.40}
      epidemiology_and_population_health: {min_pct: 0.12, max_pct: 0.32}
  weights:
    direct_seed_citation: 3.0
    landmark_anchor: 0.5
    lexical_relevance: 2.0
    dataset_method_alignment: 1.5
    cocitation: 1.5
    bibcoupling: 1.0
    core_author_overlap: 0.5

topics:
  min_cluster_size: 5
  # Categories aligned with the MS Field Orientation Guide topic map (April 2026):
  # - pathogenesis_and_immunology: Topics 2 (pathophysiology), 3 (genetics), 4 (risk/EBV), 8B (smoldering)
  # - imaging_and_biomarkers: Topics 5 (diagnosis/MRI), 6 (NfL/GFAP), 14A (AI/imaging), 15A (ML reclassification)
  # - clinical_trials_and_therapeutics: Topics 7 (DMTs), 11A (pregnancy PRIMS), 12B (pediatric PARADIGMS)
  # - clinical_care_and_management: Topics 1, 8A, 9, 10B, 11B, 12A, 14B, 16
  # - epidemiology_and_population_health: Topics 0, 1b, 4B, 10A, 13

distillation:
  provider: "anthropic"
  model: "claude-haiku-4-5-20251001"
  max_papers_per_run: 500
  cache_dir: "outputs/distilled/llm_cache"
  batch_size: 10
  qa_sample_size: 25
  qa_random_seed: 13
  # Reading levels to pre-generate for each paper. The explorer swaps between
  # the "basic" (plain language, undergrad) and "advanced" (specialist,
  # technical) variants in place using the dropdown; it does not filter
  # papers by difficulty. Results are cached per level as
  # {paper_id}__{level}.json under cache_dir.
  reading_levels:
    - basic
    - advanced
  default_reading_level: basic

abstract_backfill:
  enabled: true
  # Optional cap on API requests for missing abstracts. Set null for no cap.
  max_openalex_queries:
  sleep_seconds: 0.03
  request_timeout_seconds: 12
  max_consecutive_errors: 6

site:
  explorer:
    # Optional top-N truncation metric; ignored when start_nodes = 0.
    start_metric: "pagerank"
    # Structural relevance gates applied before top-N cutoff.
    # Set to 0/0/0 to export the full corpus into explorer payload.
    min_in_degree: 0
    min_out_degree: 0
    min_kcore: 0
    # 0 means no hard cap before explorer-side filtering.
    start_nodes: 0
    # Desktop initial load uses a lite payload for faster first render.
    lite_start_nodes: 1500
    # Mobile loads a lighter payload by default.
    mobile_start_nodes: 1500

governance:
  seed_checklist:
    enabled: true
    fail_on_error: true
    # If true, unresolved DOI metadata will fail seed checks.
    fail_on_unresolved_metadata: false
    # Quotas reflect the orientation-guide topic map (18 topics × 2 seeds = 36 core seeds).
    # Distribution: epi=8, path=7, img=6, trial=4, ccm=11.
    category_quotas:
      pathogenesis_and_immunology: {min: 4, max: 12}
      imaging_and_biomarkers: {min: 4, max: 12}
      clinical_trials_and_therapeutics: {min: 4, max: 10}
      clinical_care_and_management: {min: 6, max: 16}
      epidemiology_and_population_health: {min: 6, max: 14}
    venue_cap: 12
    author_cap: 8
    ms_lexical_min_hits: 1
    ms_concept_min_hits: 1
    allow_bridge_justification: true
  audit_gates:
    fail_on_error: true
    min_ms_focus_pct: 75.0
    max_biology_no_ms_link: 0
    max_missing_abstract_pct: 25.0
    max_missing_source_link_pct: 5.0
    enforce_category_bounds: true
  landmark_anchors:
    enabled: true
    min_year: 1980
    max_year: 2020
    output_top_k: 25
    per_decade_cap: 5
