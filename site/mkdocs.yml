site_name: "MSKB: Multiple Sclerosis Knowledge Base"
site_description: "A navigable knowledge base for undergraduate MS researchers"
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Topics: topics/index.md
  - Glossary: glossary.md
