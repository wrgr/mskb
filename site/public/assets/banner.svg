<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="Abstract citation network showing a learning pathway through three knowledge zones: Foundation, Clinical, and Frontier">
  <defs>
    <linearGradient id="mskb-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#030d16"/>
      <stop offset="48%" stop-color="#06172a"/>
      <stop offset="100%" stop-color="#030d16"/>
    </linearGradient>
    <linearGradient id="mskb-fade-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#030d16" stop-opacity="1"/>
      <stop offset="100%" stop-color="#030d16" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mskb-fade-r" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#030d16" stop-opacity="0"/>
      <stop offset="100%" stop-color="#030d16" stop-opacity="1"/>
    </linearGradient>
    <!-- Soft glow for the pathway itself -->
    <filter id="path-glow" x="-5%" y="-80%" width="110%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#mskb-bg)"/>

  <!-- Very subtle zone ambient glows -->
  <ellipse cx="200" cy="112" rx="160" ry="90" fill="#0e8f85" fill-opacity="0.04"/>
  <ellipse cx="575" cy="112" rx="180" ry="90" fill="#0e8f85" fill-opacity="0.04"/>
  <ellipse cx="975" cy="112" rx="180" ry="90" fill="#0e8f85" fill-opacity="0.04"/>

  <!-- Zone dividers -->
  <line x1="400" y1="28" x2="400" y2="192" stroke="#9ee7df" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="800" y1="28" x2="800" y2="192" stroke="#9ee7df" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- ═══ BACKGROUND EDGES ═══ -->
  <!-- Foundation internal -->
  <g stroke="#9ee7df" stroke-opacity="0.12" stroke-width="1.1" fill="none">
    <line x1="200" y1="112" x2="155" y2="72"/>
    <line x1="200" y1="112" x2="245" y2="65"/>
    <line x1="200" y1="112" x2="122" y2="148"/>
    <line x1="200" y1="112" x2="275" y2="148"/>
    <line x1="200" y1="112" x2="108" y2="88"/>
    <line x1="200" y1="112" x2="310" y2="100"/>
    <line x1="155" y1="72" x2="108" y2="88"/>
    <line x1="155" y1="72" x2="245" y2="65"/>
    <line x1="122" y1="148" x2="275" y2="148"/>
    <line x1="310" y1="100" x2="275" y2="148"/>
  </g>
  <!-- Foundation → Clinical cross-edges -->
  <g stroke="#9ee7df" stroke-opacity="0.07" stroke-width="1" fill="none">
    <line x1="310" y1="100" x2="490" y2="72"/>
    <line x1="275" y1="148" x2="510" y2="158"/>
  </g>
  <!-- Clinical internal -->
  <g stroke="#9ee7df" stroke-opacity="0.12" stroke-width="1.1" fill="none">
    <line x1="575" y1="92" x2="640" y2="148"/>
    <line x1="575" y1="92" x2="490" y2="72"/>
    <line x1="575" y1="92" x2="510" y2="158"/>
    <line x1="575" y1="92" x2="695" y2="68"/>
    <line x1="575" y1="92" x2="455" y2="132"/>
    <line x1="640" y1="148" x2="720" y2="142"/>
    <line x1="640" y1="148" x2="665" y2="178"/>
    <line x1="695" y1="68" x2="720" y2="142"/>
    <line x1="490" y1="72" x2="455" y2="132"/>
    <line x1="510" y1="158" x2="665" y2="178"/>
  </g>
  <!-- Clinical → Frontier cross-edges -->
  <g stroke="#9ee7df" stroke-opacity="0.07" stroke-width="1" fill="none">
    <line x1="720" y1="142" x2="878" y2="82"/>
    <line x1="745" y1="92" x2="855" y2="148"/>
  </g>
  <!-- Frontier internal -->
  <g stroke="#9ee7df" stroke-opacity="0.12" stroke-width="1.1" fill="none">
    <line x1="975" y1="102" x2="1058" y2="152"/>
    <line x1="975" y1="102" x2="878" y2="82"/>
    <line x1="975" y1="102" x2="920" y2="162"/>
    <line x1="975" y1="102" x2="1095" y2="72"/>
    <line x1="975" y1="102" x2="855" y2="148"/>
    <line x1="1058" y1="152" x2="1138" y2="125"/>
    <line x1="1058" y1="152" x2="920" y2="162"/>
    <line x1="1095" y1="72" x2="1138" y2="125"/>
    <line x1="1095" y1="72" x2="1168" y2="82"/>
    <line x1="1138" y1="125" x2="1168" y2="82"/>
  </g>

  <!-- ═══ HIGHLIGHTED LEARNING PATHWAY ═══ -->
  <!-- Wide soft glow behind path -->
  <path d="M 200 112 C 355 88 425 88 575 92 C 725 96 838 100 975 102"
    fill="none" stroke="#9ee7df" stroke-width="10" stroke-opacity="0.10"
    stroke-linecap="round" filter="url(#path-glow)"/>
  <!-- Dashed path line -->
  <path d="M 200 112 C 355 88 425 88 575 92 C 725 96 838 100 975 102"
    fill="none" stroke="#9ee7df" stroke-width="1.4" stroke-opacity="0.55"
    stroke-linecap="round" stroke-dasharray="7 5"/>

  <!-- ═══ PERIPHERAL NODES ═══ -->
  <g fill="#9ee7df" fill-opacity="0.20">
    <circle cx="78" cy="115" r="4"/>
    <circle cx="140" cy="178" r="3.5"/>
    <circle cx="290" cy="58" r="3.5"/>
    <circle cx="345" cy="155" r="3"/>
    <circle cx="172" cy="190" r="3"/>
    <circle cx="88" cy="58" r="3"/>
    <circle cx="445" cy="55" r="4"/>
    <circle cx="745" cy="92" r="5"/>
    <circle cx="435" cy="175" r="3.5"/>
    <circle cx="685" cy="42" r="3.5"/>
    <circle cx="760" cy="170" r="3"/>
    <circle cx="848" cy="52" r="4"/>
    <circle cx="1165" cy="148" r="3.5"/>
    <circle cx="942" cy="42" r="3.5"/>
    <circle cx="1080" cy="42" r="3"/>
    <circle cx="1185" cy="110" r="3"/>
  </g>

  <!-- ═══ SECONDARY NODES ═══ -->
  <g fill="#9ee7df" fill-opacity="0.40">
    <circle cx="108" cy="88" r="7"/>
    <circle cx="245" cy="65" r="7.5"/>
    <circle cx="122" cy="148" r="8"/>
    <circle cx="275" cy="148" r="7"/>
    <circle cx="310" cy="100" r="7"/>
    <circle cx="490" cy="72" r="8.5"/>
    <circle cx="510" cy="158" r="8"/>
    <circle cx="695" cy="68" r="8"/>
    <circle cx="720" cy="142" r="7.5"/>
    <circle cx="455" cy="132" r="7"/>
    <circle cx="665" cy="178" r="6.5"/>
    <circle cx="878" cy="82" r="8.5"/>
    <circle cx="855" cy="148" r="8"/>
    <circle cx="920" cy="162" r="7.5"/>
    <circle cx="1138" cy="125" r="7.5"/>
    <circle cx="1168" cy="82" r="7"/>
  </g>

  <!-- ═══ HUB NODES with glow rings ═══ -->
  <!-- Foundation hubs -->
  <circle cx="200" cy="112" r="30" fill="#0e8f85" fill-opacity="0.08"/>
  <circle cx="155" cy="72" r="20" fill="#0e8f85" fill-opacity="0.07"/>
  <circle cx="200" cy="112" r="17" fill="#0e8f85" fill-opacity="0.93"/>
  <circle cx="200" cy="112" r="17" fill="none" stroke="#9ee7df" stroke-opacity="0.82" stroke-width="1.5"/>
  <circle cx="155" cy="72" r="12" fill="#0e8f85" fill-opacity="0.83"/>
  <circle cx="155" cy="72" r="12" fill="none" stroke="#9ee7df" stroke-opacity="0.68" stroke-width="1.2"/>
  <!-- Clinical hubs -->
  <circle cx="575" cy="92" r="30" fill="#0e8f85" fill-opacity="0.08"/>
  <circle cx="640" cy="148" r="22" fill="#0e8f85" fill-opacity="0.07"/>
  <circle cx="575" cy="92" r="17" fill="#0e8f85" fill-opacity="0.93"/>
  <circle cx="575" cy="92" r="17" fill="none" stroke="#9ee7df" stroke-opacity="0.82" stroke-width="1.5"/>
  <circle cx="640" cy="148" r="14" fill="#0e8f85" fill-opacity="0.83"/>
  <circle cx="640" cy="148" r="14" fill="none" stroke="#9ee7df" stroke-opacity="0.68" stroke-width="1.2"/>
  <!-- Frontier hubs -->
  <circle cx="975" cy="102" r="28" fill="#0e8f85" fill-opacity="0.08"/>
  <circle cx="1058" cy="152" r="21" fill="#0e8f85" fill-opacity="0.07"/>
  <circle cx="1095" cy="72" r="21" fill="#0e8f85" fill-opacity="0.07"/>
  <circle cx="975" cy="102" r="16" fill="#0e8f85" fill-opacity="0.93"/>
  <circle cx="975" cy="102" r="16" fill="none" stroke="#9ee7df" stroke-opacity="0.82" stroke-width="1.5"/>
  <circle cx="1058" cy="152" r="13" fill="#0e8f85" fill-opacity="0.83"/>
  <circle cx="1058" cy="152" r="13" fill="none" stroke="#9ee7df" stroke-opacity="0.68" stroke-width="1.2"/>
  <circle cx="1095" cy="72" r="14" fill="#0e8f85" fill-opacity="0.85"/>
  <circle cx="1095" cy="72" r="14" fill="none" stroke="#9ee7df" stroke-opacity="0.68" stroke-width="1.2"/>

  <!-- ═══ SECTION LABELS ═══ -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <text x="200" y="20" font-size="9.5" font-weight="600" fill="#9ee7df" fill-opacity="0.62" letter-spacing="0.12em">FOUNDATION</text>
    <text x="600" y="20" font-size="9.5" font-weight="600" fill="#9ee7df" fill-opacity="0.62" letter-spacing="0.12em">CLINICAL</text>
    <text x="1000" y="20" font-size="9.5" font-weight="600" fill="#9ee7df" fill-opacity="0.62" letter-spacing="0.12em">FRONTIER</text>
  </g>

  <!-- Edge fade overlays -->
  <rect width="48" height="220" fill="url(#mskb-fade-l)"/>
  <rect x="1152" width="48" height="220" fill="url(#mskb-fade-r)"/>
</svg>
